<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OpenRouter Chat UI</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .fade-in { animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  /* チャット本文の改行・空白を保持 */
  .msg-body { white-space: pre-wrap; word-break: break-word; }
  .msg-body pre { white-space: pre; overflow-x:auto; background:#0f172a; color:#e2e8f0; padding:.75rem; border-radius:.5rem; margin:.5rem 0; font-size:.8rem; }
  .msg-body code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .typing::after { content:"▍"; animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity:0; } }
  /* スクロールバー控えめに */
  #thread::-webkit-scrollbar { width:8px; }
  #thread::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:4px; }
</style>
</head>
<body class="bg-slate-100 text-slate-800 h-screen overflow-hidden">

<!-- ===================== ロック / セットアップ オーバーレイ ===================== -->
<div id="gate" class="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
  <div class="bg-white w-full max-w-md rounded-2xl shadow-xl p-6 fade-in">
    <h1 class="text-lg font-bold mb-1 flex items-center gap-2">🔐 OpenRouter Chat</h1>

    <!-- 初回セットアップ -->
    <div id="gate-setup" class="hidden">
      <p class="text-sm text-slate-500 mb-4">OpenRouter の APIキーを入力し、暗号化用のパスワードを設定してください。キーはこの端末のブラウザ内に<strong>暗号化して</strong>保存され、外部には送信されません。</p>
      <label class="block text-xs font-medium text-slate-600 mb-1">OpenRouter APIキー</label>
      <input id="setup-key" type="password" placeholder="sk-or-..." autocomplete="off"
        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm mb-3 focus:ring-2 focus:ring-indigo-400 outline-none" />
      <label class="block text-xs font-medium text-slate-600 mb-1">暗号化パスワード（任意の文字列）</label>
      <input id="setup-pass" type="password" placeholder="このキーを保護するパスワード" autocomplete="new-password"
        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm mb-1 focus:ring-2 focus:ring-indigo-400 outline-none" />
      <input id="setup-pass2" type="password" placeholder="パスワード（確認）" autocomplete="new-password"
        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm mb-3 focus:ring-2 focus:ring-indigo-400 outline-none" />
      <p id="setup-msg" class="text-xs text-red-500 mb-2 h-4"></p>
      <button id="setup-btn"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2.5 rounded-lg transition-colors">
        暗号化して保存して開始
      </button>
    </div>

    <!-- 再訪時アンロック -->
    <div id="gate-unlock" class="hidden">
      <p class="text-sm text-slate-500 mb-4">保存済みのAPIキーを復号します。設定したパスワードを入力してください。</p>
      <label class="block text-xs font-medium text-slate-600 mb-1">パスワード</label>
      <input id="unlock-pass" type="password" placeholder="パスワード" autocomplete="current-password"
        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm mb-1 focus:ring-2 focus:ring-indigo-400 outline-none" />
      <p id="unlock-msg" class="text-xs text-red-500 mb-2 h-4"></p>
      <div class="flex gap-2">
        <button id="unlock-btn"
          class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2.5 rounded-lg transition-colors">
          アンロック
        </button>
        <button id="forget-btn"
          class="px-3 text-xs text-slate-500 hover:text-red-500 transition-colors">キーを削除</button>
      </div>
    </div>
  </div>
</div>

<!-- ===================== メインレイアウト ===================== -->
<div class="flex h-full">

  <!-- サイドバー（設定） -->
  <aside id="sidebar" class="w-80 shrink-0 bg-white border-r border-slate-200 flex flex-col h-full overflow-y-auto">
    <div class="p-4 border-b border-slate-200 flex items-center justify-between">
      <h2 class="font-bold text-slate-800">⚙️ 設定</h2>
      <button id="lock-btn" class="text-xs text-slate-500 hover:text-indigo-600" title="ロック">🔒 ロック</button>
    </div>

    <div class="p-4 space-y-4">
      <!-- モデル絞り込み -->
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1">モデルを絞り込み</label>
        <input id="model-search" type="text" placeholder="名前 / ID で検索…"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm mb-2 focus:ring-2 focus:ring-indigo-400 outline-none" />
        <div class="flex flex-wrap gap-x-3 gap-y-1 text-xs text-slate-600">
          <label class="inline-flex items-center gap-1"><input id="filter-free" type="checkbox" class="rounded"> 無料のみ</label>
          <label class="inline-flex items-center gap-1"><input id="filter-vision" type="checkbox" class="rounded"> 画像対応のみ</label>
        </div>
      </div>

      <!-- モデル選択 -->
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1">モデル <span id="model-count" class="text-slate-400 font-normal"></span></label>
        <select id="model-select" class="w-full border border-slate-300 rounded-lg px-2 py-2 text-sm bg-white focus:ring-2 focus:ring-indigo-400 outline-none"></select>
        <p id="model-info" class="text-[11px] text-slate-400 mt-1 leading-tight"></p>
        <button id="refresh-models" class="text-[11px] text-indigo-500 hover:underline mt-1">↻ モデル一覧を再取得</button>
      </div>

      <!-- システムプロンプト -->
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1">システムプロンプト</label>
        <textarea id="system-prompt" rows="5" placeholder="例: あなたは親切な日本語アシスタントです。"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm resize-y focus:ring-2 focus:ring-indigo-400 outline-none"></textarea>
      </div>

      <!-- コスト累計 -->
      <div>
        <div class="flex items-center justify-between mb-1">
          <label class="text-xs font-semibold text-slate-600">💰 累計コスト</label>
          <button id="reset-cost" class="text-[11px] text-slate-400 hover:text-red-500">リセット</button>
        </div>
        <div class="bg-slate-50 border border-slate-200 rounded-lg p-3">
          <div class="flex items-baseline justify-between">
            <span class="text-xs text-slate-500">合計</span>
            <span id="cost-total" class="text-lg font-bold text-slate-800">$0.000000</span>
          </div>
          <div id="cost-by-model" class="mt-2 space-y-1 text-[11px] text-slate-500"></div>
        </div>
      </div>
    </div>

    <div class="mt-auto p-4 border-t border-slate-200">
      <button id="clear-chat" class="w-full text-xs text-slate-500 hover:text-red-500 border border-slate-200 rounded-lg py-2 transition-colors">🗑 会話をクリア</button>
    </div>
  </aside>

  <!-- チャット領域 -->
  <main class="flex-1 flex flex-col h-full relative" id="drop-zone">
    <header class="px-5 py-3 border-b border-slate-200 bg-white/80 backdrop-blur flex items-center justify-between">
      <h1 class="font-bold text-slate-800">💬 OpenRouter Chat UI</h1>
      <span id="active-model" class="text-xs text-slate-400"></span>
    </header>

    <!-- メッセージスレッド -->
    <div id="thread" class="flex-1 overflow-y-auto px-4 py-6 space-y-4"></div>

    <!-- ドロップ時のオーバーレイ -->
    <div id="drop-overlay" class="hidden absolute inset-0 bg-indigo-500/10 border-4 border-dashed border-indigo-400 z-20 flex items-center justify-center text-indigo-600 font-semibold pointer-events-none">
      画像をここにドロップ
    </div>

    <!-- 入力エリア -->
    <div class="border-t border-slate-200 bg-white p-3">
      <div id="attachments" class="flex flex-wrap gap-2 mb-2 empty:hidden"></div>
      <div class="flex items-end gap-2">
        <label class="cursor-pointer text-slate-400 hover:text-indigo-600 p-2" title="画像を添付">
          🖼️
          <input id="file-input" type="file" accept="image/*" multiple class="hidden" />
        </label>
        <textarea id="input" rows="1" placeholder="メッセージを入力（Enterで送信 / Shift+Enterで改行）。画像はドラッグ&ドロップやペーストも可。"
          class="flex-1 border border-slate-300 rounded-xl px-3 py-2 text-sm resize-none max-h-40 focus:ring-2 focus:ring-indigo-400 outline-none"></textarea>
        <button id="send-btn"
          class="bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-300 text-white text-sm font-medium px-4 py-2.5 rounded-xl transition-colors">送信</button>
        <button id="stop-btn"
          class="hidden bg-red-500 hover:bg-red-600 text-white text-sm font-medium px-4 py-2.5 rounded-xl transition-colors">停止</button>
      </div>
    </div>
  </main>
</div>

<script>
"use strict";

/* ============================================================
   定数 / localStorage キー
============================================================ */
const LS = {
  enc:     "or_chat_apikey_enc",   // 暗号化済みAPIキー {salt, iv, data}
  models:  "or_chat_models",       // モデル一覧キャッシュ
  model:   "or_chat_model",        // 選択中モデルID
  system:  "or_chat_system",       // システムプロンプト
  history: "or_chat_history",      // 会話履歴 [{role, content}]
  costs:   "or_chat_costs",        // {total, models:{id:{cost,prompt,completion,calls}}}
  filters: "or_chat_filters",      // {search, free, vision}
};
const API_BASE = "https://openrouter.ai/api/v1";
const APP_TITLE = "OpenRouter Chat UI";

/* ============================================================
   状態
============================================================ */
let API_KEY = null;          // 復号後の平文キー（メモリのみ）
let MODELS = [];             // モデル一覧 [{id, name, pricing, modalities, free}]
let messages = [];           // 会話履歴
let pendingImages = [];      // 添付待ち画像 [dataURL]
let abortCtrl = null;        // ストリーミング中断用

/* ============================================================
   Web Crypto: PBKDF2 -> AES-GCM
============================================================ */
const enc = new TextEncoder();
const dec = new TextDecoder();

function bufToB64(buf) {
  const bytes = new Uint8Array(buf);
  let s = "";
  for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
  return btoa(s);
}
function b64ToBuf(b64) {
  const s = atob(b64);
  const bytes = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) bytes[i] = s.charCodeAt(i);
  return bytes.buffer;
}

async function deriveKey(password, salt) {
  const baseKey = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 200000, hash: "SHA-256" },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt", "decrypt"]
  );
}

async function encryptKey(apiKey, password) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, salt);
  const cipher = await crypto.subtle.encrypt(
    { name: "AES-GCM", iv }, key, enc.encode(apiKey)
  );
  return {
    salt: bufToB64(salt.buffer),
    iv: bufToB64(iv.buffer),
    data: bufToB64(cipher),
  };
}

async function decryptKey(password) {
  const stored = JSON.parse(localStorage.getItem(LS.enc));
  const salt = new Uint8Array(b64ToBuf(stored.salt));
  const iv = new Uint8Array(b64ToBuf(stored.iv));
  const key = await deriveKey(password, salt);
  // 復号失敗（誤パスワード）は例外を投げる（GCM認証タグ検証）
  const plain = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv }, key, b64ToBuf(stored.data)
  );
  return dec.decode(plain);
}

/* ============================================================
   ゲート（セットアップ / アンロック）
============================================================ */
const $ = (id) => document.getElementById(id);

function showGate() {
  $("gate").classList.remove("hidden");
  if (localStorage.getItem(LS.enc)) {
    $("gate-setup").classList.add("hidden");
    $("gate-unlock").classList.remove("hidden");
    $("unlock-pass").focus();
  } else {
    $("gate-unlock").classList.add("hidden");
    $("gate-setup").classList.remove("hidden");
    $("setup-key").focus();
  }
}
function hideGate() { $("gate").classList.add("hidden"); }

$("setup-btn").addEventListener("click", async () => {
  const k = $("setup-key").value.trim();
  const p = $("setup-pass").value;
  const p2 = $("setup-pass2").value;
  const msg = $("setup-msg");
  msg.textContent = "";
  if (!k) { msg.textContent = "APIキーを入力してください。"; return; }
  if (p.length < 4) { msg.textContent = "パスワードは4文字以上にしてください。"; return; }
  if (p !== p2) { msg.textContent = "パスワード（確認）が一致しません。"; return; }
  try {
    const encObj = await encryptKey(k, p);
    localStorage.setItem(LS.enc, JSON.stringify(encObj));
    API_KEY = k;
    hideGate();
    await onUnlocked();
  } catch (e) {
    msg.textContent = "保存に失敗しました: " + e.message;
  }
});

$("unlock-btn").addEventListener("click", async () => {
  const p = $("unlock-pass").value;
  const msg = $("unlock-msg");
  msg.textContent = "";
  try {
    API_KEY = await decryptKey(p);
    $("unlock-pass").value = "";
    hideGate();
    await onUnlocked();
  } catch (e) {
    msg.textContent = "パスワードが違います。";
  }
});

$("forget-btn").addEventListener("click", () => {
  if (confirm("保存済みの暗号化APIキーを削除しますか？（会話履歴やコストは残ります）")) {
    localStorage.removeItem(LS.enc);
    showGate();
  }
});

$("lock-btn").addEventListener("click", () => {
  API_KEY = null;
  showGate();
});

// Enterキーでゲート操作
$("unlock-pass").addEventListener("keydown", (e) => { if (e.key === "Enter") $("unlock-btn").click(); });
$("setup-pass2").addEventListener("keydown", (e) => { if (e.key === "Enter") $("setup-btn").click(); });

/* ============================================================
   アンロック後の初期化
============================================================ */
async function onUnlocked() {
  loadSystemPrompt();
  loadFilters();
  renderCosts();
  loadHistory();
  await loadModels(false);
}

/* ============================================================
   モデル一覧
============================================================ */
function normalizeModels(raw) {
  return raw.map((m) => {
    const pricing = m.pricing || {};
    const prompt = parseFloat(pricing.prompt || "0");
    const completion = parseFloat(pricing.completion || "0");
    const modalities = (m.architecture && m.architecture.input_modalities) || [];
    return {
      id: m.id,
      name: m.name || m.id,
      pricePrompt: isNaN(prompt) ? 0 : prompt,
      priceCompletion: isNaN(completion) ? 0 : completion,
      vision: modalities.includes("image"),
      free: (isNaN(prompt) ? 0 : prompt) === 0 && (isNaN(completion) ? 0 : completion) === 0,
    };
  });
}

async function loadModels(forceRefresh) {
  const cached = localStorage.getItem(LS.models);
  if (cached && !forceRefresh) {
    try { MODELS = JSON.parse(cached); renderModelOptions(); } catch {}
  }
  try {
    const res = await fetch(`${API_BASE}/models`, {
      headers: { Authorization: `Bearer ${API_KEY}` },
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    MODELS = normalizeModels(data.data || []);
    localStorage.setItem(LS.models, JSON.stringify(MODELS));
    renderModelOptions();
  } catch (e) {
    if (!MODELS.length) {
      $("model-info").textContent = "モデル一覧の取得に失敗しました: " + e.message;
    }
  }
}

function getFilters() {
  return {
    search: $("model-search").value.trim().toLowerCase(),
    free: $("filter-free").checked,
    vision: $("filter-vision").checked,
  };
}

function renderModelOptions() {
  const f = getFilters();
  const sel = $("model-select");
  const prev = localStorage.getItem(LS.model) || sel.value;
  const filtered = MODELS.filter((m) => {
    if (f.free && !m.free) return false;
    if (f.vision && !m.vision) return false;
    if (f.search && !(m.id.toLowerCase().includes(f.search) || m.name.toLowerCase().includes(f.search))) return false;
    return true;
  });
  sel.innerHTML = "";
  filtered.forEach((m) => {
    const opt = document.createElement("option");
    opt.value = m.id;
    opt.textContent = (m.free ? "🆓 " : "") + (m.vision ? "🖼 " : "") + m.name;
    sel.appendChild(opt);
  });
  if (filtered.some((m) => m.id === prev)) sel.value = prev;
  $("model-count").textContent = `(${filtered.length}/${MODELS.length})`;
  onModelChange();
}

function currentModel() {
  return MODELS.find((m) => m.id === $("model-select").value) || null;
}

function onModelChange() {
  const m = currentModel();
  if (!m) { $("model-info").textContent = ""; $("active-model").textContent = ""; return; }
  localStorage.setItem(LS.model, m.id);
  const tags = [];
  if (m.free) tags.push("無料"); else tags.push("$/1Mトークン: 入力 $" + (m.pricePrompt * 1e6).toFixed(3) + " / 出力 $" + (m.priceCompletion * 1e6).toFixed(3));
  if (m.vision) tags.push("画像対応");
  $("model-info").textContent = tags.join(" ・ ");
  $("active-model").textContent = m.id;
}

$("model-select").addEventListener("change", onModelChange);
$("refresh-models").addEventListener("click", () => loadModels(true));
["model-search", "filter-free", "filter-vision"].forEach((id) => {
  $(id).addEventListener("input", () => { saveFilters(); renderModelOptions(); });
});

function saveFilters() {
  localStorage.setItem(LS.filters, JSON.stringify(getFilters()));
}
function loadFilters() {
  try {
    const f = JSON.parse(localStorage.getItem(LS.filters) || "{}");
    if (f.search) $("model-search").value = f.search;
    $("filter-free").checked = !!f.free;
    $("filter-vision").checked = !!f.vision;
  } catch {}
}

/* ============================================================
   システムプロンプト永続化
============================================================ */
function loadSystemPrompt() {
  $("system-prompt").value = localStorage.getItem(LS.system) || "";
}
$("system-prompt").addEventListener("input", () => {
  localStorage.setItem(LS.system, $("system-prompt").value);
});

/* ============================================================
   コスト累計
============================================================ */
function loadCosts() {
  try { return JSON.parse(localStorage.getItem(LS.costs)) || { total: 0, models: {} }; }
  catch { return { total: 0, models: {} }; }
}
function addCost(modelId, cost, promptTokens, completionTokens) {
  const c = loadCosts();
  c.total += cost;
  if (!c.models[modelId]) c.models[modelId] = { cost: 0, prompt: 0, completion: 0, calls: 0 };
  const mc = c.models[modelId];
  mc.cost += cost;
  mc.prompt += promptTokens || 0;
  mc.completion += completionTokens || 0;
  mc.calls += 1;
  localStorage.setItem(LS.costs, JSON.stringify(c));
  renderCosts();
}
function renderCosts() {
  const c = loadCosts();
  $("cost-total").textContent = "$" + c.total.toFixed(6);
  const box = $("cost-by-model");
  box.innerHTML = "";
  const entries = Object.entries(c.models).sort((a, b) => b[1].cost - a[1].cost);
  if (!entries.length) { box.innerHTML = '<span class="text-slate-400">まだ利用がありません</span>'; return; }
  for (const [id, mc] of entries) {
    const row = document.createElement("div");
    row.className = "flex justify-between gap-2";
    row.innerHTML = `<span class="truncate" title="${id}">${id}</span>` +
      `<span class="shrink-0 font-medium text-slate-600">$${mc.cost.toFixed(6)}</span>`;
    box.appendChild(row);
  }
}
$("reset-cost").addEventListener("click", () => {
  if (confirm("累計コストをリセットしますか？")) {
    localStorage.removeItem(LS.costs);
    renderCosts();
  }
});

/* ============================================================
   会話履歴の描画 / 永続化
============================================================ */
function saveHistory() {
  localStorage.setItem(LS.history, JSON.stringify(messages));
}
function loadHistory() {
  try { messages = JSON.parse(localStorage.getItem(LS.history)) || []; }
  catch { messages = []; }
  $("thread").innerHTML = "";
  messages.forEach((m) => renderMessage(m.role, m.content));
  scrollBottom();
}
$("clear-chat").addEventListener("click", () => {
  if (confirm("会話履歴を消去しますか？")) {
    messages = [];
    saveHistory();
    $("thread").innerHTML = "";
  }
});

// content は文字列 or マルチモーダル配列。表示用にテキストと画像を抽出。
function extractParts(content) {
  if (typeof content === "string") return { text: content, images: [] };
  const text = content.filter((p) => p.type === "text").map((p) => p.text).join("\n");
  const images = content.filter((p) => p.type === "image_url").map((p) => p.image_url.url);
  return { text, images };
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}
// ```code``` ブロックだけ最低限整形
function formatBody(text) {
  const parts = text.split(/```/);
  let html = "";
  parts.forEach((part, i) => {
    if (i % 2 === 1) {
      const body = part.replace(/^[a-zA-Z0-9]*\n/, "");
      html += `<pre><code>${escapeHtml(body)}</code></pre>`;
    } else {
      html += escapeHtml(part);
    }
  });
  return html;
}

function renderMessage(role, content) {
  const { text, images } = extractParts(content);
  const wrap = document.createElement("div");
  wrap.className = "flex fade-in " + (role === "user" ? "justify-end" : "justify-start");
  const bubble = document.createElement("div");
  bubble.className = "max-w-[80%] rounded-2xl px-4 py-2.5 text-sm shadow-sm " +
    (role === "user" ? "bg-indigo-600 text-white" : "bg-white border border-slate-200 text-slate-800");
  let inner = "";
  if (images.length) {
    inner += '<div class="flex flex-wrap gap-2 mb-2">' +
      images.map((u) => `<img src="${u}" class="h-24 rounded-lg object-cover border border-white/30" />`).join("") +
      "</div>";
  }
  inner += `<div class="msg-body">${formatBody(text)}</div>`;
  bubble.innerHTML = inner;
  wrap.appendChild(bubble);
  $("thread").appendChild(wrap);
  return bubble;
}

function scrollBottom() {
  const t = $("thread");
  t.scrollTop = t.scrollHeight;
}

/* ============================================================
   画像添付（ファイル / D&D / ペースト）
============================================================ */
function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
async function addImageFiles(files) {
  for (const file of files) {
    if (!file.type.startsWith("image/")) continue;
    const url = await fileToDataURL(file);
    pendingImages.push(url);
  }
  renderAttachments();
}
function renderAttachments() {
  const box = $("attachments");
  box.innerHTML = "";
  pendingImages.forEach((url, idx) => {
    const wrap = document.createElement("div");
    wrap.className = "relative";
    wrap.innerHTML =
      `<img src="${url}" class="h-16 w-16 object-cover rounded-lg border border-slate-200" />` +
      `<button data-idx="${idx}" class="att-del absolute -top-1.5 -right-1.5 bg-red-500 text-white rounded-full w-5 h-5 text-xs leading-none">×</button>`;
    box.appendChild(wrap);
  });
  box.querySelectorAll(".att-del").forEach((b) => {
    b.addEventListener("click", () => {
      pendingImages.splice(parseInt(b.dataset.idx), 1);
      renderAttachments();
    });
  });
}

$("file-input").addEventListener("change", (e) => {
  addImageFiles(Array.from(e.target.files));
  e.target.value = "";
});

// ドラッグ&ドロップ
const dz = $("drop-zone");
let dragDepth = 0;
dz.addEventListener("dragenter", (e) => { e.preventDefault(); dragDepth++; $("drop-overlay").classList.remove("hidden"); });
dz.addEventListener("dragover", (e) => { e.preventDefault(); });
dz.addEventListener("dragleave", (e) => { dragDepth--; if (dragDepth <= 0) { dragDepth = 0; $("drop-overlay").classList.add("hidden"); } });
dz.addEventListener("drop", (e) => {
  e.preventDefault();
  dragDepth = 0;
  $("drop-overlay").classList.add("hidden");
  if (e.dataTransfer.files.length) addImageFiles(Array.from(e.dataTransfer.files));
});

// クリップボードからのペースト
$("input").addEventListener("paste", (e) => {
  const items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  const imgs = [];
  for (const it of items) {
    if (it.type.startsWith("image/")) { const f = it.getAsFile(); if (f) imgs.push(f); }
  }
  if (imgs.length) { e.preventDefault(); addImageFiles(imgs); }
});

/* ============================================================
   送信 / ストリーミング
============================================================ */
const inputEl = $("input");
inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
});
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
$("send-btn").addEventListener("click", send);
$("stop-btn").addEventListener("click", () => { if (abortCtrl) abortCtrl.abort(); });

function setSending(on) {
  $("send-btn").classList.toggle("hidden", on);
  $("stop-btn").classList.toggle("hidden", !on);
  $("send-btn").disabled = on;
}

function buildUserContent(text, images) {
  if (!images.length) return text;
  const parts = [];
  if (text) parts.push({ type: "text", text });
  images.forEach((url) => parts.push({ type: "image_url", image_url: { url } }));
  return parts;
}

async function send() {
  if (!API_KEY) { showGate(); return; }
  const model = currentModel();
  if (!model) { alert("モデルを選択してください。"); return; }
  const text = inputEl.value.trim();
  if (!text && !pendingImages.length) return;

  const images = pendingImages.slice();
  const userContent = buildUserContent(text, images);

  // ユーザーメッセージを履歴に追加・描画
  messages.push({ role: "user", content: userContent });
  renderMessage("user", userContent);
  saveHistory();

  // 入力欄リセット
  inputEl.value = "";
  inputEl.style.height = "auto";
  pendingImages = [];
  renderAttachments();
  scrollBottom();

  // アシスタントのバブルを用意（ストリーミング描画先）
  const bubble = renderMessage("assistant", "");
  const bodyEl = bubble.querySelector(".msg-body");
  bodyEl.classList.add("typing");
  scrollBottom();

  // リクエストメッセージ構築
  const sys = $("system-prompt").value.trim();
  const reqMessages = [];
  if (sys) reqMessages.push({ role: "system", content: sys });
  for (const m of messages) reqMessages.push(m);

  setSending(true);
  abortCtrl = new AbortController();
  let answer = "";
  let usage = null;

  try {
    const res = await fetch(`${API_BASE}/chat/completions`, {
      method: "POST",
      headers: {
        Authorization: `Bearer ${API_KEY}`,
        "Content-Type": "application/json",
        "HTTP-Referer": location.origin || "https://localhost",
        "X-Title": APP_TITLE,
      },
      body: JSON.stringify({
        model: model.id,
        messages: reqMessages,
        stream: true,
        usage: { include: true }, // 実コストを取得
      }),
      signal: abortCtrl.signal,
    });

    if (!res.ok) {
      const errText = await res.text().catch(() => "");
      throw new Error(`HTTP ${res.status}: ${errText.slice(0, 300)}`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop(); // 末尾の未完行は次へ
      for (const line of lines) {
        const t = line.trim();
        if (!t.startsWith("data:")) continue;
        const data = t.slice(5).trim();
        if (data === "[DONE]") continue;
        try {
          const json = JSON.parse(data);
          const delta = json.choices && json.choices[0] && json.choices[0].delta;
          if (delta && delta.content) {
            answer += delta.content;
            bodyEl.innerHTML = formatBody(answer);
            scrollBottom();
          }
          if (json.usage) usage = json.usage;
        } catch { /* コメント行などは無視 */ }
      }
    }
  } catch (e) {
    if (e.name === "AbortError") {
      answer += (answer ? "\n\n" : "") + "⏹ 生成を停止しました。";
    } else {
      answer += (answer ? "\n\n" : "") + "⚠️ エラー: " + e.message;
    }
  } finally {
    bodyEl.classList.remove("typing");
    bodyEl.innerHTML = formatBody(answer || "(応答なし)");
    abortCtrl = null;
    setSending(false);

    // 履歴へ保存
    messages.push({ role: "assistant", content: answer });
    saveHistory();

    // コスト計上
    recordCost(model, usage);
    scrollBottom();
  }
}

function recordCost(model, usage) {
  if (!usage) return;
  const pt = usage.prompt_tokens || 0;
  const ct = usage.completion_tokens || 0;
  // OpenRouter は usage.cost に実コスト(USD)を返す。無ければ価格から概算。
  let cost = (typeof usage.cost === "number") ? usage.cost
           : pt * model.pricePrompt + ct * model.priceCompletion;
  addCost(model.id, cost, pt, ct);
}

/* ============================================================
   起動
============================================================ */
window.addEventListener("DOMContentLoaded", () => {
  if (!window.crypto || !crypto.subtle) {
    alert("このブラウザは Web Crypto API に対応していないため利用できません。HTTPS または localhost で開いてください。");
  }
  showGate();
});
</script>
