<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>OpenRouter Chat</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f7f7f8;
    --surface: #ffffff;
    --border: #ececef;
    --border-strong: #e0e0e4;
    --text: #18181b;
    --muted: #8a8a93;
    --accent: #4f46e5;
    --accent-2: #7c3aed;
  }
  * { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif; }
  html, body { height: 100%; }
  body {
    color: var(--text);
    background:
      radial-gradient(900px 500px at 100% -5%, #eef0ff 0%, transparent 55%),
      radial-gradient(700px 500px at -10% 110%, #f3ecff 0%, transparent 50%),
      var(--bg);
    letter-spacing: -0.01em;
  }
  .brand-gradient { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%); }
  .text-gradient {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .glass { background: rgba(255,255,255,0.72); backdrop-filter: saturate(180%) blur(16px); -webkit-backdrop-filter: saturate(180%) blur(16px); }

  /* スクロールバー */
  .scroll-thin::-webkit-scrollbar { width: 8px; height: 8px; }
  .scroll-thin::-webkit-scrollbar-thumb { background: #d8d8de; border-radius: 8px; }
  .scroll-thin::-webkit-scrollbar-thumb:hover { background: #c4c4cc; }
  .scroll-thin::-webkit-scrollbar-track { background: transparent; }

  /* フィールド共通 */
  .field {
    width: 100%; background: #fff; border: 1px solid var(--border-strong);
    border-radius: 12px; padding: 10px 12px; font-size: 13px; color: var(--text);
    transition: border-color .15s, box-shadow .15s; outline: none;
  }
  .field::placeholder { color: #b3b3ba; }
  .field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }

  /* セクション見出し */
  .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }

  /* トグルスイッチ */
  .switch { display:inline-block; width: 36px; height: 21px; border-radius: 999px; background: #e2e2e8; position: relative; transition: background .2s; flex: 0 0 auto; }
  .switch::after { content:""; position:absolute; top:2px; left:2px; width:17px; height:17px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.18); transition: transform .2s; }
  input:checked + .switch { background: var(--accent); }
  input:checked + .switch::after { transform: translateX(15px); }

  /* select のカスタム矢印 */
  .select-wrap { position: relative; }
  .select-wrap select { appearance: none; -webkit-appearance: none; padding-right: 34px; }
  .select-wrap .chev { position:absolute; right:12px; top:50%; transform:translateY(-50%); pointer-events:none; color:#9a9aa3; }

  /* メッセージ本文 */
  .msg-body { white-space: pre-wrap; word-break: break-word; line-height: 1.65; font-size: 14.5px; }
  .msg-body pre { white-space: pre; overflow-x:auto; background:#0e1117; color:#e6edf3; padding:.85rem 1rem; border-radius:12px; margin:.6rem 0; font-size:12.5px; line-height:1.55; }
  .msg-body pre code { font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace; }
  .typing::after { content:"▋"; margin-left:1px; animation: blink 1.1s steps(1) infinite; color: var(--accent); }
  @keyframes blink { 50% { opacity:0; } }

  .fade-in { animation: fadeIn .28s cubic-bezier(.2,.7,.3,1); }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
  .pop { animation: pop .2s ease; }
  @keyframes pop { from { transform: scale(.96); opacity:.6 } to { transform: scale(1); opacity:1 } }

  .btn-press { transition: transform .08s ease, box-shadow .15s, filter .15s; }
  .btn-press:active { transform: scale(.97); }

  /* サジェストチップ */
  .chip {
    border: 1px solid var(--border-strong); background:#fff; border-radius: 14px;
    padding: 12px 14px; text-align:left; font-size: 13px; color: #52525b;
    transition: border-color .15s, transform .12s, box-shadow .15s; cursor: pointer;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); box-shadow: 0 6px 20px -8px rgba(79,70,229,.35); transform: translateY(-1px); }
</style>
</head>
<body class="overflow-hidden">

<!-- ===================== ロック / セットアップ オーバーレイ ===================== -->
<div id="gate" class="fixed inset-0 z-50 bg-zinc-900/40 backdrop-blur-md flex items-center justify-center p-4">
  <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl shadow-indigo-900/10 ring-1 ring-black/5 p-7 fade-in">
    <div class="flex items-center gap-3 mb-5">
      <div class="brand-gradient w-10 h-10 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-500/30">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.8L20 10l-5.1 1.2L12 17l-1.9-5.8L4 10l6.1-1.2z"/></svg>
      </div>
      <div>
        <h1 class="text-base font-bold leading-tight">OpenRouter Chat</h1>
        <p class="text-xs text-zinc-400 leading-tight">あらゆるAIモデルを、ひとつの画面で</p>
      </div>
    </div>

    <!-- 初回セットアップ -->
    <div id="gate-setup" class="hidden">
      <p class="text-[13px] text-zinc-500 mb-5 leading-relaxed">OpenRouter の APIキーを入力し、暗号化用のパスワードを設定してください。キーは<strong class="text-zinc-700">この端末内で暗号化</strong>され、外部には送信されません。</p>
      <label class="eyebrow block mb-1.5">OpenRouter API キー</label>
      <input id="setup-key" type="password" placeholder="sk-or-..." autocomplete="off" class="field mb-3.5" />
      <label class="eyebrow block mb-1.5">暗号化パスワード</label>
      <input id="setup-pass" type="password" placeholder="このキーを保護するパスワード" autocomplete="new-password" class="field mb-2" />
      <input id="setup-pass2" type="password" placeholder="パスワード（確認）" autocomplete="new-password" class="field mb-2" />
      <p id="setup-msg" class="text-xs text-rose-500 mb-2 h-4"></p>
      <button id="setup-btn" class="btn-press brand-gradient w-full text-white text-sm font-semibold py-3 rounded-xl shadow-lg shadow-indigo-500/25 hover:brightness-105">暗号化して保存して開始</button>
    </div>

    <!-- 再訪時アンロック -->
    <div id="gate-unlock" class="hidden">
      <p class="text-[13px] text-zinc-500 mb-5 leading-relaxed">保存済みのAPIキーを復号します。設定したパスワードを入力してください。</p>
      <label class="eyebrow block mb-1.5">パスワード</label>
      <input id="unlock-pass" type="password" placeholder="••••••••" autocomplete="current-password" class="field mb-2" />
      <p id="unlock-msg" class="text-xs text-rose-500 mb-2 h-4"></p>
      <div class="flex items-center gap-2">
        <button id="unlock-btn" class="btn-press brand-gradient flex-1 text-white text-sm font-semibold py-3 rounded-xl shadow-lg shadow-indigo-500/25 hover:brightness-105">アンロック</button>
        <button id="forget-btn" class="px-3 py-3 text-xs text-zinc-400 hover:text-rose-500 transition-colors">キーを削除</button>
      </div>
    </div>
  </div>
</div>

<!-- ===================== メインレイアウト ===================== -->

        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.8L20 10l-5.1 1.2L12 17l-1.9-5.8L4 10l6.1-1.2z"/></svg>
      </div>

          </div>

    <div class="px-5 py-4 border-t border-zinc-200/70 shrink-0 flex items-center gap-2">

        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
        ロック
      </button>
    </div>
  </aside>

  <!-- チャット領域 -->
  <main class="flex-1 flex flex-col h-full relative min-w-0" id="drop-zone">
    <header class="glass h-16 shrink-0 px-6 border-b border-zinc-200/70 flex items-center justify-between">

        <p class="text-[13px] text-zinc-500 mb-7">モデルを選んでメッセージを送信。画像も添付できます。</p>
        <div class="grid sm:grid-cols-2 gap-2.5 text-left">

          <button class="suggest chip" data-text="次のPythonコードをレビューして、改善点を教えて：\n\n">🐍 コードをレビューしてもらう</button>
          <button class="suggest chip" data-text="この画像に写っているものを説明して。">🖼️ 画像について質問する（要・画像対応モデル）</button>
          <button class="suggest chip" data-text="週末に行ける、東京近郊の日帰り旅行プランを3つ提案して。">🗺️ アイデアを出してもらう</button>
        </div>

    </div>

    <!-- ドロップ時のオーバーレイ -->
    <div id="drop-overlay" class="hidden absolute inset-0 bg-indigo-500/5 backdrop-blur-[2px] z-20 flex items-center justify-center pointer-events-none p-6">
      <div class="border-2 border-dashed border-indigo-400 rounded-3xl w-full h-full flex flex-col items-center justify-center text-indigo-600 gap-2">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v13"/></svg>
        <span class="font-semibold">画像をここにドロップ</span>
      </div>
    </div>

    <!-- 入力エリア -->
    <div class="shrink-0 px-4 sm:px-6 pb-5 pt-1">
      <div class="max-w-3xl mx-auto">
        <div id="attachments" class="flex flex-wrap gap-2 mb-2 empty:hidden"></div>
        <div class="bg-white rounded-[22px] border border-zinc-200 shadow-lg shadow-zinc-300/30 focus-within:border-indigo-300 focus-within:shadow-indigo-200/40 transition-all p-2 pl-3">
          <textarea id="input" rows="1" placeholder="メッセージを入力…  （Enterで送信 / Shift+Enterで改行）" class="w-full bg-transparent text-[14.5px] leading-relaxed resize-none max-h-44 outline-none placeholder:text-zinc-400 px-1 pt-2"></textarea>
          <div class="flex items-center justify-between pt-1">
            <label class="btn-press cursor-pointer text-zinc-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl p-2 transition-colors" title="画像を添付">

            <div class="flex items-center gap-2">
              <button id="stop-btn" class="hidden btn-press bg-zinc-900 hover:bg-zinc-800 text-white text-[13px] font-semibold pl-3 pr-3.5 py-2 rounded-xl inline-flex items-center gap-1.5">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>停止
              </button>
              <button id="send-btn" class="btn-press brand-gradient disabled:opacity-40 text-white rounded-xl w-10 h-10 flex items-center justify-center shadow-lg shadow-indigo-500/25 hover:brightness-105" title="送信">

              </button>
            </div>
          </div>
        </div>
        <p class="text-center text-[10.5px] text-zinc-400 mt-2">応答は端末内に保存されます。APIキーは暗号化済み。</p>
      </div>
    </div>
  </main>

  <!-- モバイル用サイドバー背景 -->
  <div id="sidebar-backdrop" class="hidden fixed inset-0 bg-zinc-900/30 backdrop-blur-sm z-30 md:hidden"></div>
</div>

<script>
"use strict";

/* ============================================================
   定数 / localStorage キー
============================================================ */
const LS = {
  enc:     "or_chat_apikey_enc",
  models:  "or_chat_models",
  model:   "or_chat_model",
  system:  "or_chat_system",
  history: "or_chat_history",
  costs:   "or_chat_costs",
  filters: "or_chat_filters",
};
const API_BASE = "https://openrouter.ai/api/v1";
const APP_TITLE = "OpenRouter Chat UI";

/* ============================================================
   状態
============================================================ */
let API_KEY = null;
let MODELS = [];
let messages = [];
let pendingImages = [];
let abortCtrl = null;

/* ============================================================
   Web Crypto: PBKDF2 -> AES-GCM
============================================================ */
const enc = new TextEncoder();
const dec = new TextDecoder();

function bufToB64(buf) {
  const bytes = new Uint8Array(buf);
  let s = "";
  for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
  return btoa(s);
}
function b64ToBuf(b64) {
  const s = atob(b64);
  const bytes = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) bytes[i] = s.charCodeAt(i);
  return bytes.buffer;
}

async function deriveKey(password, salt) {
  const baseKey = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 200000, hash: "SHA-256" },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt", "decrypt"]
  );
}

async function encryptKey(apiKey, password) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, salt);
  const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(apiKey));
  return { salt: bufToB64(salt.buffer), iv: bufToB64(iv.buffer), data: bufToB64(cipher) };
}

async function decryptKey(password) {
  const stored = JSON.parse(localStorage.getItem(LS.enc));
  const salt = new Uint8Array(b64ToBuf(stored.salt));
  const iv = new Uint8Array(b64ToBuf(stored.iv));
  const key = await deriveKey(password, salt);
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, b64ToBuf(stored.data));
  return dec.decode(plain);
}

/* ============================================================
   ゲート（セットアップ / アンロック）
============================================================ */
const $ = (id) => document.getElementById(id);

function showGate() {
  $("gate").classList.remove("hidden");
  if (localStorage.getItem(LS.enc)) {
    $("gate-setup").classList.add("hidden");
    $("gate-unlock").classList.remove("hidden");
    setTimeout(() => $("unlock-pass").focus(), 50);
  } else {
    $("gate-unlock").classList.add("hidden");
    $("gate-setup").classList.remove("hidden");
    setTimeout(() => $("setup-key").focus(), 50);
  }
}
function hideGate() { $("gate").classList.add("hidden"); }

$("setup-btn").addEventListener("click", async () => {
  const k = $("setup-key").value.trim();
  const p = $("setup-pass").value;
  const p2 = $("setup-pass2").value;
  const msg = $("setup-msg");
  msg.textContent = "";
  if (!k) { msg.textContent = "APIキーを入力してください。"; return; }
  if (p.length < 4) { msg.textContent = "パスワードは4文字以上にしてください。"; return; }
  if (p !== p2) { msg.textContent = "パスワード（確認）が一致しません。"; return; }
  try {
    const encObj = await encryptKey(k, p);
    localStorage.setItem(LS.enc, JSON.stringify(encObj));
    API_KEY = k;
    hideGate();
    await onUnlocked();
  } catch (e) {
    msg.textContent = "保存に失敗しました: " + e.message;
  }
});

    $("unlock-pass").value = "";
    hideGate();
    await onUnlocked();
  } catch (e) {
    msg.textContent = "パスワードが違います。";
  }
});

    localStorage.removeItem(LS.enc);

});

$("lock-btn").addEventListener("click", () => { API_KEY = null; showGate(); });

$("unlock-pass").addEventListener("keydown", (e) => { if (e.key === "Enter") $("unlock-btn").click(); });

/* ============================================================
   アンロック後の初期化
============================================================ */
async function onUnlocked() {
  loadSystemPrompt();
  loadFilters();
  renderCosts();
  loadHistory();
  await loadModels(false);
}

/* ============================================================
   モデル一覧
============================================================ */
function normalizeModels(raw) {
  return raw.map((m) => {
    const pricing = m.pricing || {};
    const prompt = parseFloat(pricing.prompt || "0");
    const completion = parseFloat(pricing.completion || "0");
    const modalities = (m.architecture && m.architecture.input_modalities) || [];
    const pp = isNaN(prompt) ? 0 : prompt;
    const pc = isNaN(completion) ? 0 : completion;
    return {
      id: m.id,
      name: m.name || m.id,
      pricePrompt: pp,
      priceCompletion: pc,
      vision: modalities.includes("image"),
      free: pp === 0 && pc === 0,
    };
  });
}

async function loadModels(forceRefresh) {
  const cached = localStorage.getItem(LS.models);
  if (cached && !forceRefresh) {
    try { MODELS = JSON.parse(cached); renderModelOptions(); } catch {}
  }
  try {
    const res = await fetch(`${API_BASE}/models`, { headers: { Authorization: `Bearer ${API_KEY}` } });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    MODELS = normalizeModels(data.data || []);
    localStorage.setItem(LS.models, JSON.stringify(MODELS));
    renderModelOptions();
  } catch (e) {
    if (!MODELS.length) $("model-info").textContent = "モデル一覧の取得に失敗しました: " + e.message;
  }
}

function getFilters() {
  return {
    search: $("model-search").value.trim().toLowerCase(),
    free: $("filter-free").checked,
    vision: $("filter-vision").checked,
  };
}

function renderModelOptions() {
  const f = getFilters();
  const sel = $("model-select");
  const prev = localStorage.getItem(LS.model) || sel.value;
  const filtered = MODELS.filter((m) => {
    if (f.free && !m.free) return false;
    if (f.vision && !m.vision) return false;
    if (f.search && !(m.id.toLowerCase().includes(f.search) || m.name.toLowerCase().includes(f.search))) return false;
    return true;
  });
  sel.innerHTML = "";
  filtered.forEach((m) => {
    const opt = document.createElement("option");
    opt.value = m.id;
    opt.textContent = (m.free ? "🆓 " : "") + (m.vision ? "🖼 " : "") + m.name;
    sel.appendChild(opt);
  });
  if (filtered.some((m) => m.id === prev)) sel.value = prev;
  $("model-count").textContent = MODELS.length ? `(${filtered.length}/${MODELS.length})` : "";
  onModelChange();
}

function currentModel() { return MODELS.find((m) => m.id === $("model-select").value) || null; }

function onModelChange() {
  const m = currentModel();
  if (!m) { $("model-info").textContent = ""; $("active-model").textContent = ""; return; }
  localStorage.setItem(LS.model, m.id);
  const tags = [];
  if (m.free) tags.push("無料");
  else tags.push("入力 $" + (m.pricePrompt * 1e6).toFixed(3) + " / 出力 $" + (m.priceCompletion * 1e6).toFixed(3) + " (per 1M)");
  if (m.vision) tags.push("画像対応");
  $("model-info").textContent = tags.join("  ・  ");
  $("active-model").textContent = m.id;
}

$("model-select").addEventListener("change", onModelChange);
$("refresh-models").addEventListener("click", () => loadModels(true));
["model-search", "filter-free", "filter-vision"].forEach((id) => {
  $(id).addEventListener("input", () => { saveFilters(); renderModelOptions(); });
});

function saveFilters() { localStorage.setItem(LS.filters, JSON.stringify(getFilters())); }
function loadFilters() {
  try {
    const f = JSON.parse(localStorage.getItem(LS.filters) || "{}");
    if (f.search) $("model-search").value = f.search;
    $("filter-free").checked = !!f.free;
    $("filter-vision").checked = !!f.vision;
  } catch {}
}

/* ============================================================
   システムプロンプト永続化
============================================================ */
function loadSystemPrompt() { $("system-prompt").value = localStorage.getItem(LS.system) || ""; }
$("system-prompt").addEventListener("input", () => { localStorage.setItem(LS.system, $("system-prompt").value); });

/* ============================================================
   コスト累計
============================================================ */
function loadCosts() {
  try { return JSON.parse(localStorage.getItem(LS.costs)) || { total: 0, models: {} }; }
  catch { return { total: 0, models: {} }; }
}
function addCost(modelId, cost, promptTokens, completionTokens) {
  const c = loadCosts();
  c.total += cost;
  if (!c.models[modelId]) c.models[modelId] = { cost: 0, prompt: 0, completion: 0, calls: 0 };
  const mc = c.models[modelId];
  mc.cost += cost;
  mc.prompt += promptTokens || 0;
  mc.completion += completionTokens || 0;
  mc.calls += 1;
  localStorage.setItem(LS.costs, JSON.stringify(c));
  renderCosts();
}
function renderCosts() {
  const c = loadCosts();
  $("cost-total").textContent = "$" + c.total.toFixed(6);
  const box = $("cost-by-model");
  box.innerHTML = "";
  const entries = Object.entries(c.models).sort((a, b) => b[1].cost - a[1].cost);
  if (!entries.length) { box.innerHTML = '<span class="text-zinc-300">まだ利用がありません</span>'; return; }
  for (const [id, mc] of entries) {
    const row = document.createElement("div");
    row.className = "flex justify-between gap-2 items-center";
    const short = id.split("/").pop();
    row.innerHTML = `<span class="truncate text-zinc-500" title="${id}">${short}</span>` +
      `<span class="shrink-0 font-semibold text-zinc-700 tabular-nums">$${mc.cost.toFixed(6)}</span>`;
    box.appendChild(row);
  }
}
$("reset-cost").addEventListener("click", () => {
  if (confirm("累計コストをリセットしますか？")) { localStorage.removeItem(LS.costs); renderCosts(); }
});

/* ============================================================
   会話履歴の描画 / 永続化
============================================================ */
function saveHistory() { localStorage.setItem(LS.history, JSON.stringify(messages)); }
function updateEmptyState() { $("empty-state").classList.toggle("hidden", messages.length > 0); }

function loadHistory() {
  try { messages = JSON.parse(localStorage.getItem(LS.history)) || []; }
  catch { messages = []; }
  document.querySelectorAll(".msg-row").forEach((el) => el.remove());
  messages.forEach((m) => renderMessage(m.role, m.content));
  updateEmptyState();
  scrollBottom();
}
$("clear-chat").addEventListener("click", () => {
  if (confirm("会話履歴を消去しますか？")) {
    messages = [];
    saveHistory();
    document.querySelectorAll(".msg-row").forEach((el) => el.remove());
    updateEmptyState();
  }
});

function extractParts(content) {
  if (typeof content === "string") return { text: content, images: [] };
  const text = content.filter((p) => p.type === "text").map((p) => p.text).join("\n");
  const images = content.filter((p) => p.type === "image_url").map((p) => p.image_url.url);
  return { text, images };
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}
function formatBody(text) {
  const parts = text.split(/```/);
  let html = "";
  parts.forEach((part, i) => {
    if (i % 2 === 1) {
      const body = part.replace(/^[a-zA-Z0-9]*\n/, "");
      html += `<pre><code>${escapeHtml(body)}</code></pre>`;
    } else {
      html += escapeHtml(part);
    }
  });
  return html;
}

const AI_AVATAR = `<div class="shrink-0 w-8 h-8 rounded-xl brand-gradient flex items-center justify-center text-white shadow-md shadow-indigo-500/20"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.8L20 10l-5.1 1.2L12 17l-1.9-5.8L4 10l6.1-1.2z"/></svg></div>`;
const USER_AVATAR = `<div class="shrink-0 w-8 h-8 rounded-xl bg-zinc-200 text-zinc-500 flex items-center justify-center"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 21a7 7 0 0 1 14 0"/></svg></div>`;

function renderMessage(role, content) {
  const { text, images } = extractParts(content);
  const isUser = role === "user";

  const row = document.createElement("div");
  row.className = "msg-row fade-in w-full max-w-3xl mx-auto flex gap-3 mb-6 " + (isUser ? "flex-row-reverse" : "");
  row.innerHTML = isUser ? USER_AVATAR : AI_AVATAR;

  const col = document.createElement("div");
  col.className = "flex flex-col min-w-0 " + (isUser ? "items-end" : "items-start");

  const label = document.createElement("span");
  label.className = "text-[11px] font-semibold text-zinc-400 mb-1 px-1";
  label.textContent = isUser ? "あなた" : "AI";
  col.appendChild(label);

  const bubble = document.createElement("div");
  bubble.className = "max-w-full rounded-2xl px-4 py-3 shadow-sm " +
    (isUser ? "brand-gradient text-white rounded-tr-md" : "bg-white border border-zinc-200/80 text-zinc-800 rounded-tl-md");

  let inner = "";
  if (images.length) {
    inner += '<div class="flex flex-wrap gap-2 ' + (text ? "mb-2.5" : "") + '">' +
      images.map((u) => `<img src="${u}" class="h-28 rounded-xl object-cover ${isUser ? "ring-1 ring-white/30" : "ring-1 ring-zinc-200"}" />`).join("") +
      "</div>";
  }
  inner += `<div class="msg-body">${formatBody(text)}</div>`;
  bubble.innerHTML = inner;
  col.appendChild(bubble);
  row.appendChild(col);

  $("thread").appendChild(row);
  return bubble;
}

function scrollBottom() { const t = $("thread"); t.scrollTop = t.scrollHeight; }

/* ============================================================
   画像添付（ファイル / D&D / ペースト）
============================================================ */
function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
async function addImageFiles(files) {
  for (const file of files) {
    if (!file.type.startsWith("image/")) continue;
    pendingImages.push(await fileToDataURL(file));
  }
  renderAttachments();
}
function renderAttachments() {
  const box = $("attachments");
  box.innerHTML = "";
  pendingImages.forEach((url, idx) => {
    const wrap = document.createElement("div");
    wrap.className = "relative group";
    wrap.innerHTML =
      `<img src="${url}" class="h-16 w-16 object-cover rounded-xl border border-zinc-200" />` +
      `<button data-idx="${idx}" class="att-del absolute -top-1.5 -right-1.5 bg-zinc-900 text-white rounded-full w-5 h-5 text-xs leading-none flex items-center justify-center shadow hover:bg-rose-500 transition-colors">×</button>`;
    box.appendChild(wrap);
  });
  box.querySelectorAll(".att-del").forEach((b) => {
    b.addEventListener("click", () => { pendingImages.splice(parseInt(b.dataset.idx), 1); renderAttachments(); });
  });
}

$("file-input").addEventListener("change", (e) => { addImageFiles(Array.from(e.target.files)); e.target.value = ""; });

const dz = $("drop-zone");
let dragDepth = 0;
dz.addEventListener("dragenter", (e) => { e.preventDefault(); dragDepth++; $("drop-overlay").classList.remove("hidden"); });
dz.addEventListener("dragover", (e) => { e.preventDefault(); });
dz.addEventListener("dragleave", () => { dragDepth--; if (dragDepth <= 0) { dragDepth = 0; $("drop-overlay").classList.add("hidden"); } });
dz.addEventListener("drop", (e) => {
  e.preventDefault(); dragDepth = 0; $("drop-overlay").classList.add("hidden");
  if (e.dataTransfer.files.length) addImageFiles(Array.from(e.dataTransfer.files));
});

$("input").addEventListener("paste", (e) => {
  const items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  const imgs = [];
  for (const it of items) { if (it.type.startsWith("image/")) { const f = it.getAsFile(); if (f) imgs.push(f); } }
  if (imgs.length) { e.preventDefault(); addImageFiles(imgs); }
});

   サジェストチップ / モバイルサイドバー
============================================================ */
document.querySelectorAll(".suggest").forEach((c) => {
  c.addEventListener("click", () => {

/* ============================================================
   送信 / ストリーミング
============================================================ */
const inputEl = $("input");
inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 176) + "px";
});
inputEl.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } });
$("send-btn").addEventListener("click", send);
$("stop-btn").addEventListener("click", () => { if (abortCtrl) abortCtrl.abort(); });

function setSending(on) {
  $("send-btn").classList.toggle("hidden", on);
  $("stop-btn").classList.toggle("hidden", !on);
}

function buildUserContent(text, images) {
  if (!images.length) return text;
  const parts = [];
  if (text) parts.push({ type: "text", text });
  images.forEach((url) => parts.push({ type: "image_url", image_url: { url } }));
  return parts;
}

async function send() {
  if (!API_KEY) { showGate(); return; }
  const model = currentModel();
  if (!model) { alert("モデルを選択してください。"); return; }
  const text = inputEl.value.trim();
  if (!text && !pendingImages.length) return;

  const images = pendingImages.slice();
  const userContent = buildUserContent(text, images);

  messages.push({ role: "user", content: userContent });
  updateEmptyState();
  renderMessage("user", userContent);
  saveHistory();

  inputEl.value = "";
  inputEl.style.height = "auto";
  pendingImages = [];
  renderAttachments();
  scrollBottom();

  const bubble = renderMessage("assistant", "");
  const bodyEl = bubble.querySelector(".msg-body");
  bodyEl.classList.add("typing");
  scrollBottom();

  const sys = $("system-prompt").value.trim();
  const reqMessages = [];
  if (sys) reqMessages.push({ role: "system", content: sys });
  for (const m of messages) reqMessages.push(m);

  setSending(true);
  abortCtrl = new AbortController();
  let answer = "";
  let usage = null;

  try {
    const res = await fetch(`${API_BASE}/chat/completions`, {
      method: "POST",
      headers: {
        Authorization: `Bearer ${API_KEY}`,
        "Content-Type": "application/json",
        "HTTP-Referer": location.origin || "https://localhost",
        "X-Title": APP_TITLE,
      },
      body: JSON.stringify({ model: model.id, messages: reqMessages, stream: true, usage: { include: true } }),
      signal: abortCtrl.signal,
    });

    if (!res.ok) {
      const errText = await res.text().catch(() => "");
      throw new Error(`HTTP ${res.status}: ${errText.slice(0, 300)}`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();
      for (const line of lines) {
        const t = line.trim();
        if (!t.startsWith("data:")) continue;
        const data = t.slice(5).trim();
        if (data === "[DONE]") continue;
        try {
          const json = JSON.parse(data);
          const delta = json.choices && json.choices[0] && json.choices[0].delta;
          if (delta && delta.content) {
            answer += delta.content;
            bodyEl.innerHTML = formatBody(answer);
            scrollBottom();
          }
          if (json.usage) usage = json.usage;
        } catch {}
      }
    }
  } catch (e) {
    if (e.name === "AbortError") answer += (answer ? "\n\n" : "") + "⏹ 生成を停止しました。";
    else answer += (answer ? "\n\n" : "") + "⚠️ エラー: " + e.message;
  } finally {
    bodyEl.classList.remove("typing");
    bodyEl.innerHTML = formatBody(answer || "(応答なし)");
    abortCtrl = null;
    setSending(false);
    messages.push({ role: "assistant", content: answer });
    saveHistory();
    recordCost(model, usage);
    scrollBottom();
  }
}

function recordCost(model, usage) {
  if (!usage) return;
  const pt = usage.prompt_tokens || 0;
  const ct = usage.completion_tokens || 0;
  let cost = (typeof usage.cost === "number") ? usage.cost : pt * model.pricePrompt + ct * model.priceCompletion;
  addCost(model.id, cost, pt, ct);
}
