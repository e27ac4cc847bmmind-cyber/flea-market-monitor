name: フリマ監視

on:
  schedule:
    - cron: "0 * * * *"  # 毎時実行（1ジョブ約2-3分 × 24回 × 30日 ≈ 1,800分/月）
  workflow_dispatch:      # 手動実行

# 同時実行を防ぐ（最新のrunのみ実行、古いrunはキャンセル）
concurrency:
  group: monitor-loop
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: 依存パッケージインストール
        run: pip install -r scripts/requirements.txt

      - name: 監視スクリプト実行
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PYTHONUTF8: "1"
        run: python scripts/monitor.py

      - name: seen_ids.json と config.json をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ids.json config.json
          git diff --staged --quiet || git commit -m "chore: 監視データ更新 $(date +'%Y-%m-%d %H:%M:%S')"
          git pull --rebase origin main
          git push
