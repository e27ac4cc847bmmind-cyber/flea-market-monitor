name: フリマ監視

# 【一時停止中】作り直しのため自動実行を停止。手動実行(workflow_dispatch)のみ。
# 自動監視を再開する場合は schedule(cron) と末尾の自己チェーン step を復活させること。
on:
  workflow_dispatch:         # 手動実行のみ（cron・自己チェーンは停止済み）

# 同時実行を防ぐ（最新のrunのみ実行、古いrunはキャンセル）
concurrency:
  group: monitor-loop
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15      # ゾンビ防止：15分で強制キャンセル
    permissions:
      contents: write

    steps:
      - name: リポジトリチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: 依存パッケージインストール
        run: pip install -r scripts/requirements.txt

      - name: 監視スクリプト実行
        run: python scripts/monitor.py
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PYTHONUTF8: "1"

      - name: seen_ids.json と config.json をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ids.json config.json
          git diff --staged --quiet || git commit -m "chore: 監視データ更新 $(date +'%Y-%m-%d %H:%M:%S')"
          git pull --rebase origin main
          git push

      # 【一時停止中】自己チェーン（次回実行の自動トリガー）は作り直しのため削除。
      # 再開する場合は sleep 60 → workflow_dispatch を叩く step を復活させること。
