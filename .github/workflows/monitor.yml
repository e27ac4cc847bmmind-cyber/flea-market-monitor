name: フリマ監視

on:
  schedule:
    - cron: "*/10 * * * *"  # 10分ごとのフォールバック（チェーン切れ対策）
  workflow_dispatch:         # 手動実行 or 自己トリガー

# 同時実行を防ぐ（最新のrunのみ実行、古いrunはキャンセル）
concurrency:
  group: monitor-loop
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15      # ゾンビ防止：15分で強制キャンセル
    permissions:
      contents: write

    steps:
      - name: リポジトリチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: 依存パッケージインストール
        run: pip install -r scripts/requirements.txt

      - name: 監視スクリプト実行
        run: python scripts/monitor.py
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PYTHONUTF8: "1"

      - name: seen_ids.json と config.json をコミット
        run: |
          echo "=== config.json の last_run.started_at ==="
          python3 -c "import json; c=json.load(open('config.json')); print(c.get('last_run',{}).get('started_at','NONE'))"
          echo "=== git status ==="
          git status --short
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ids.json config.json
          echo "=== git diff --staged --stat ==="
          git diff --staged --stat
          git diff --staged --quiet || git commit -m "chore: 監視データ更新 $(date +'%Y-%m-%d %H:%M:%S')"
          git pull --rebase origin main
          git push

      - name: 1分後に次回実行をトリガー（自己チェーン）
        if: always()
        env:
          GH_PAT: ${{ secrets.SHOPPING_SERCH }}
        run: |
          sleep 60
          if [ -z "$GH_PAT" ]; then
            echo "⚠️  GH_PAT 未設定 — 自動トリガーをスキップ（10分後のcronで再開）"
            exit 0
          fi
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            -X POST \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/monitor.yml/dispatches" \
            -d '{"ref":"main"}')
          if [ "$HTTP_STATUS" = "204" ]; then
            echo "✅ 次回実行をトリガーしました（1分後）"
          else
            echo "❌ トリガー失敗 HTTP $HTTP_STATUS（10分後のcronで再開）"
          fi
